<!DOCTYPE html>
<html>

<head>

    <title>KNN</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">      

</head>

<body>

<div class="container">

    <div class="sidebar">

        <h2>

            <i class="fa-solid fa-atom"></i>

            AML Project

        </h2>

        <a href="/">

            <i class="fa-solid fa-house"></i>

            Dashboard

        </a>

        <a href="/machine_learning">

            <i class="fa-solid fa-chart-line"></i>

            Machine Learning

        </a>

        <a href="/deep_learning">

            <i class="fa-solid fa-brain"></i>

            Deep Learning

        </a>

        <a href="/generative_ai">

            <i class="fa-solid fa-robot"></i>

            Generative AI

        </a>

        <a href="/apriori">

            <i class="fa-solid fa-cart-shopping"></i>

            Apriori

        </a>

    </div>


    <div class="main">

        <div class="topbar">

            <h1>KNN Algorithm</h1>

            <p>

                Iris Flower Prediction

            </p>

        </div>


        <div class="card">

            <form action="/knn_predict"
                  method="POST">

                <label>Sepal Length</label>

                <br><br>

                <input
                    type="number"
                    step="0.1"
                    name="sepal_length"
                    required>

                <br><br>


                <label>Sepal Width</label>

                <br><br>

                <input
                    type="number"
                    step="0.1"
                    name="sepal_width"
                    required>

                <br><br>


                <label>Petal Length</label>

                <br><br>

                <input
                    type="number"
                    step="0.1"
                    name="petal_length"
                    required>

                <br><br>


                <label>Petal Width</label>

                <br><br>

                <input
                    type="number"
                    step="0.1"
                    name="petal_width"
                    required>

                <br><br>


                <button type="submit">

                    Predict

                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
